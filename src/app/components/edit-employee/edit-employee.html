<div class="min-h-screen bg-gradient-to-br from-slate-50 via-gray-100 to-indigo-50 px-6 py-12 flex justify-center items-center">
  <div class="max-w-4xl w-full bg-white/80 backdrop-blur-2xl p-10 md:p-16 rounded-[2.5rem] shadow-sm border border-white/20">
    
    <div class="mb-12">
      <h1 class="text-3xl font-bold text-slate-900 mt-2">Edit Employee</h1>
    </div>

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-10">
      
      <div class="flex items-center gap-8 pb-4 border-b border-slate-100">
        <div class="relative w-24 h-24 rounded-full bg-slate-50 border border-slate-200 overflow-hidden flex items-center justify-center group">
          @if (photoPreview()) {
            <img [src]="photoPreview()" class="w-full h-full object-cover">
          } @else {
            <svg class="w-8 h-8 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          }
        </div>
        <div>
          <label class="cursor-pointer bg-slate-900 text-white text-[10px] font-bold uppercase tracking-widest px-6 py-3 rounded-full hover:bg-black transition-all">
            Upload Photo
            <input type="file" (change)="onFileSelected($event)" class="hidden" accept="image/*">
          </label>
          <p class="mt-2 text-[10px] text-slate-400 uppercase tracking-tight">Format: JPG, PNG. Max 2MB.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-10">
        
        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">First Name</label>
          <input formControlName="first_name" type="text" placeholder="Max"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Last Name</label>
          <input formControlName="last_name" type="text" placeholder="Tran"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Email Address</label>
          <input formControlName="email" type="email" placeholder="max.tran@georgebrown.ca"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Designation</label>
          <input formControlName="designation" type="text" placeholder="Senior Developer"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Department</label>
          <input formControlName="department" type="text" placeholder="Engineering"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Salary (Annual)</label>
          <input formControlName="salary" type="number" placeholder="95000"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Date of Joining</label>
          <input formControlName="date_of_joining" type="date"
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Gender</label>
          <select formControlName="gender" 
            class="block w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-slate-900 focus:ring-0 focus:border-indigo-500 sm:text-sm transition-all">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

      </div>

      <div class="flex justify-end items-center gap-10 pt-6">
        <a routerLink="/employees" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">
          Cancel
        </a>
        <button type="submit" [disabled]="employeeForm.invalid || isLoading()"
          class="bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest px-12 py-4 rounded-full hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 transition-all shadow-xl shadow-indigo-100 active:scale-95">
          @if (isLoading()) { Saving... } @else { Update Record }
        </button>
      </div>
    </form>
  </div>
</div>
